<!DOCTYPE html>
<html>

<head>

    <title>Honeypot Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Honeypot Attack Monitoring</h1>

    <div class="card">

        <h2>Total Attacks</h2>

        <p>{{ total_attacks }}</p>

    </div>

    <table>

        <tr>
            <th>ID</th>
            <th>IP Address</th>
            <th>Username</th>
            <th>Password</th>
            <th>Timestamp</th>
        </tr>

        {% for attack in attacks %}

        <tr>

            <td>{{ attack[0] }}</td>
            <td>{{ attack[1] }}</td>
            <td>{{ attack[2] }}</td>
            <td>{{ attack[3] }}</td>
            <td>{{ attack[4] }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
